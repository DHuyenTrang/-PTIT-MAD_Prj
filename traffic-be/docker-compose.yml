version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: traffic_mysql
    environment:
      MYSQL_ROOT_PASSWORD: tuanphat2004
      MYSQL_DATABASE: traffic_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptuanphat2004"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: traffic_db
      DB_USERNAME: root
      DB_PASSWORD: tuanphat2004
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_USERNAME: phatletuan153@gmail.com
      MAIL_PASSWORD: axjyjetrxfpxuhep
      JWT_SECRET: VGVzdFNlY3JldEtleTEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
      JWT_EXPIRATION: 86400000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
